<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>AARASH INDUSTRIES</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif:ital,wght@0,400;0,700;1,400;1,700&family=Manrope:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- Logo Animation Screen -->
    <div id="logo-animation" class="logo-animation">

      <div class="antigravity-scene">
        <!-- TOP-LEFT: Kadhai / Wok (Floating left, rotating) -->
        <div class="antigravity-item ag-tl">
          <svg viewBox="0 0 200 160" xmlns="http://www.w3.org/2000/svg">
            <rect x="2" y="62" width="30" height="10" rx="5" fill="white"/>
            <rect x="168" y="62" width="30" height="10" rx="5" fill="white"/>
            <path d="M30 58 Q100 130 170 58" stroke="white" stroke-width="9" fill="none" stroke-linecap="round"/>
            <path d="M42 58 Q100 118 158 58" stroke="white" stroke-width="5" fill="rgba(255,255,255,0.15)" stroke-linecap="round"/>
            <line x1="30" y1="58" x2="170" y2="58" stroke="white" stroke-width="9" stroke-linecap="round"/>
            <path d="M70 75 Q100 100 130 75" stroke="rgba(255,255,255,0.3)" stroke-width="3" fill="none" stroke-linecap="round"/>
          </svg>
        </div>

        <!-- RIGHT: Pressure Cooker -->
        <div class="antigravity-item ag-tr">
          <svg viewBox="0 0 160 200" xmlns="http://www.w3.org/2000/svg">
            <rect x="25" y="55" width="110" height="110" rx="18" fill="none" stroke="white" stroke-width="8"/>
            <rect x="33" y="63" width="94" height="94" rx="12" fill="rgba(255,255,255,0.1)"/>
            <rect x="20" y="42" width="120" height="18" rx="9" fill="white"/>
            <rect x="68" y="28" width="24" height="16" rx="8" fill="white"/>
            <circle cx="115" cy="34" r="7" fill="white"/>
            <rect x="112" y="20" width="6" height="14" rx="3" fill="white"/>
            <path d="M25 100 Q5 100 8 120 Q8 140 25 140" stroke="white" stroke-width="7" fill="none" stroke-linecap="round"/>
            <path d="M135 100 Q155 100 152 120 Q152 140 135 140" stroke="white" stroke-width="7" fill="none" stroke-linecap="round"/>
            <path d="M45 80 L45 145" stroke="rgba(255,255,255,0.25)" stroke-width="4" stroke-linecap="round"/>
          </svg>
        </div>

        <!-- BOTTOM-LEFT: Tawa / Flat Pan -->
        <div class="antigravity-item ag-bl">
          <svg viewBox="0 0 220 120" xmlns="http://www.w3.org/2000/svg">
            <rect x="150" y="52" width="68" height="12" rx="6" fill="white"/>
            <ellipse cx="95" cy="58" rx="82" ry="24" fill="none" stroke="white" stroke-width="8"/>
            <ellipse cx="95" cy="58" rx="73" ry="16" fill="rgba(255,255,255,0.12)"/>
            <ellipse cx="95" cy="62" rx="82" ry="24" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="3"/>
            <ellipse cx="78" cy="52" rx="28" ry="7" fill="rgba(255,255,255,0.2)"/>
          </svg>
        </div>

        <!-- BOTTOM-RIGHT: Saucepan -->
        <div class="antigravity-item ag-br">
          <svg viewBox="0 0 180 200" xmlns="http://www.w3.org/2000/svg">
            <rect x="130" y="72" width="48" height="12" rx="6" fill="white"/>
            <path d="M30 80 L30 158 Q30 172 50 172 L120 172 Q140 172 140 158 L140 80 Z" fill="none" stroke="white" stroke-width="8"/>
            <path d="M38 88 L38 156 Q38 164 52 164 L118 164 Q132 164 132 156 L132 88 Z" fill="rgba(255,255,255,0.1)"/>
            <rect x="24" y="68" width="122" height="16" rx="8" fill="white"/>
            <rect x="72" y="54" width="26" height="16" rx="8" fill="white"/>
            <path d="M50 95 L50 160" stroke="rgba(255,255,255,0.25)" stroke-width="4" stroke-linecap="round"/>
            <path d="M140 80 Q155 72 158 60" stroke="white" stroke-width="6" fill="none" stroke-linecap="round"/>
          </svg>
        </div>
      </div>      <!-- Shimmer sweep -->
      <div class="logo-animation-shimmer"></div>

      <div class="logo-animation-container">
        <div class="logo-emerge">
          <img
            src="logo_2.png"
            alt="Aarash Industries Logo"
            class="logo-emerge-img"
          />
        </div>
        <div class="company-branding">
          <span class="brand-text-aarash">AARASH</span>
          <span class="brand-text-industries">INDUSTRIES</span>
          <div class="brand-underline"></div>
        </div>
      </div>
    </div>

    <!-- Background Watermark -->
    <div class="watermark"></div>

    <header class="hero-section">
      <img src="logo_2.png" alt="Aarash Industries Logo" class="logo" />
      <h1>AARASH INDUSTRIES</h1>
      <p class="hero-subtitle">Built to last for generations.</p>
    </header>

    <nav>
      <button onclick="filterProducts('all')">All Products</button>
      <button onclick="filterProducts('triply')">Triply</button>
      <button onclick="filterProducts('honeycomb')">Honeycomb</button>
      <button onclick="filterProducts('pressure')">Pressure Cookers</button>
      <button onclick="filterProducts('nonstick')">Non-Stick</button>
      <button onclick="filterProducts('hard')">Hard Anodised</button>
      <button onclick="filterProducts('mirror')">Mirror Polish</button>
      <button onclick="filterProducts('powder')">Powder Coating</button>
      <button onclick="filterProducts('sandwich')">Sandwich Bottom</button>
    </nav>

    <div class="products-wrapper">
      <section id="products" class="product-grid"></section>
    </div>

    <!-- Product Detail Modal -->
    <div id="productModal" class="product-modal">
      <div class="modal-content">
        <div class="modal-body">
          <div class="modal-image">
            <img id="modalProductImage" src="" alt="Product" />
          </div>
          <div class="modal-details">
            <h2 id="modalProductName"></h2>
            <p class="modal-category" id="modalProductCategory"></p>
            <p id="modalProductDescription"></p>

            <div class="modal-section">
              <h4>Specifications</h4>
              <p id="modalProductSpecs"></p>
            </div>

            <div class="modal-section">
              <h4>Features</h4>
              <p id="modalProductFeatures"></p>
            </div>

            <div class="modal-section">
              <h4>Select Sizes (Check desired sizes)</h4>
              <div id="modalSizeCheckboxes" class="size-checkboxes"></div>
            </div>

            <button class="add-to-cart-btn" onclick="addToCart()">
              REQUEST QUOTE
            </button>
          </div>
        </div>
      </div>
    </div>

    <footer>
      <p>© 2026 AARASH INDUSTRIES</p>
      <p>Contact: +91 7838027000 | Deepak Jain</p>
      <p>Built with Passion by Aksh Jain</p>
    </footer>

    <script src="script.js"></script>
  </body>
</html>
