<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>AARASH INDUSTRIES</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- Logo Animation Screen -->
    <div id="logo-animation" class="logo-animation">
      <div class="logo-animation-container">
        <div class="logo-emerge">
          <img
            src="logo_2.png"
            alt="Aarash Industries Logo"
            class="logo-emerge-img"
          />
        </div>
        <div class="company-branding">
          <span class="brand-text brand-text-aarash">AARASH</span>
          <span class="brand-text brand-text-industries">INDUSTRIES</span>
        </div>
      </div>
    </div>

    <!-- Background Watermark -->
    <div class="watermark"></div>

    <header>
      <img src="logo_2.png" alt="Aarash Industries Logo" class="logo" />
      <h1>AARASH INDUSTRIES</h1>
      <p>Built to last for generations</p>
    </header>

    <nav>
      <button onclick="filterProducts('all')">All Products</button>
      <button onclick="filterProducts('triply')">Triply</button>
      <button onclick="filterProducts('honeycomb')">Honeycomb</button>
      <button onclick="filterProducts('pressure')">Pressure Cookers</button>
      <button onclick="filterProducts('nonstick')">Non-Stick</button>
      <button onclick="filterProducts('hard')">Hard Anodised</button>
      <button onclick="filterProducts('mirror')">Mirror Polish</button>
      <button onclick="filterProducts('powder')">Powder Coating</button>
      <button onclick="filterProducts('sandwich')">Sandwich Bottom</button>
    </nav>

    <div class="products-wrapper">
      <section id="products" class="product-grid"></section>
    </div>

    <!-- Product Detail Modal -->
    <div id="productModal" class="product-modal">
      <div class="modal-content">
        <div class="modal-body">
          <div class="modal-image">
            <img id="modalProductImage" src="" alt="Product" />
          </div>
          <div class="modal-details">
            <h2 id="modalProductName"></h2>
            <p class="modal-category" id="modalProductCategory"></p>
            <p id="modalProductDescription"></p>

            <div class="modal-section">
              <h4>Specifications</h4>
              <p id="modalProductSpecs"></p>
            </div>

            <div class="modal-section">
              <h4>Features</h4>
              <p id="modalProductFeatures"></p>
            </div>

            <div class="modal-section">
              <h4>Select Sizes (Check desired sizes)</h4>
              <div id="modalSizeCheckboxes" class="size-checkboxes"></div>
            </div>

            <button class="add-to-cart-btn" onclick="addToCart()">
              Request Quote
            </button>
          </div>
        </div>
      </div>
    </div>

    <footer>
      <p>© 2026 AARASH INDUSTRIES</p>
      <p>Contact: +91 7838027000 | Deepak Jain</p>
      <p>Built with Passion by Aksh Jain</p>
    </footer>

    <script src="script.js"></script>
  </body>
</html>
